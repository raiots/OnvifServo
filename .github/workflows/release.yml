name: Release binaries

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-arm64
            goos: linux
            goarch: arm64
            ext: ""
          - name: linux-amd64
            goos: linux
            goarch: amd64
            ext: ""
          - name: darwin-arm64
            goos: darwin
            goarch: arm64
            ext: ""
          - name: darwin-amd64
            goos: darwin
            goarch: amd64
            ext: ""
          - name: windows-amd64
            goos: windows
            goarch: amd64
            ext: ".exe"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Test
        run: go test ./...

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          go build \
            -trimpath \
            -ldflags="-s -w -X onvif-servo-proxy/internal/version.Commit=${GITHUB_SHA}" \
            -o "dist/onvif-servo-proxy-${{ matrix.name }}${{ matrix.ext }}" \
            ./cmd/onvif-servo-proxy

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: onvif-servo-proxy-${{ matrix.name }}
          path: dist/onvif-servo-proxy-${{ matrix.name }}${{ matrix.ext }}
          if-no-files-found: error

  publish:
    name: Publish release assets
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release'

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum onvif-servo-proxy-* > SHA256SUMS.txt

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${GITHUB_REF_NAME}" dist/* --repo "${GITHUB_REPOSITORY}" --clobber
